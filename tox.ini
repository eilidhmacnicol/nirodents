[tox]
requires =
  tox>=4
envlist =
  py31{2,3,4}-latest
  py312-min
  py31{2,3,4}-pre
  style
  spellcheck
skip_missing_interpreters = true

# Configuration that allows us to split tests across GitHub runners effectively
[gh-actions]
python =
  3.12: py312
  3.13: py313
  3.14: py314

[gh-actions:env]
DEPENDS =
  min: min
  latest: latest
  pre: pre

[testenv]
description = Pytest with coverage
labels = test
pip_pre =
  pre: true
pass_env =
  TEMPLATEFLOW_HOME
  # CI variables
  TEST_DATA_HOME
  TEST_OUTPUT_DIR
  TEST_WORK_DIR
  FMRIPREP_REGRESSION_SOURCE
  CACHED_WORK_DIRECTORY
  # CircleCI-specific
  CIRCLE_NPROCS
  SAVE_CIRCLE_ARTIFACTS
  # getpass.getuser() sources for Windows:
  LOGNAME
  USER
  LNAME
  USERNAME
  # Pass user color preferences through
  PY_COLORS
  FORCE_COLOR
  NO_COLOR
  CLICOLOR
  CLICOLOR_FORCE
  PYTHON_GIL
extras = tests
setenv =
  NO_ET=1
  pre: PIP_EXTRA_INDEX_URL=https://pypi.anaconda.org/scientific-python-nightly-wheels/simple
  pre: UV_EXTRA_INDEX_URL=https://pypi.anaconda.org/scientific-python-nightly-wheels/simple
  pre: UV_INDEX_STRATEGY=unsafe-best-match
uv_resolution =
  min: lowest-direct

commands =
  python -c 'import nirodents; print(nirodents.__version__)'

[testenv:style]
description = Check our style guide
labels = check
deps =
  ruff
skip_install = true
commands =
  ruff check --diff
  ruff format --diff

[testenv:style-fix]
description = Auto-apply style guide to the extent possible
labels = pre-release
deps =
  ruff
skip_install = true
commands =
  ruff check --fix
  ruff format

[testenv:typecheck]
description = "Run mypy type checking"
labels = check
deps =
  mypy
  microsoft-python-type-stubs @ git+https://github.com/microsoft/python-type-stubs.git
extras = types
commands =
  mypy nirodents

[testenv:spellcheck]
description = Check spelling
labels = check
deps =
  codespell[toml]
skip_install = true
commands =
  codespell . {posargs}
